mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning

dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

# Сервер добавляется вручную в приложении
proxies: []

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - DIRECT

rules:
  # YouTube
  - DOMAIN-SUFFIX,youtube.com,Proxy
  - DOMAIN-SUFFIX,googlevideo.com,Proxy
  - DOMAIN-SUFFIX,ytimg.com,Proxy
  - DOMAIN-SUFFIX,yt3.ggpht.com,Proxy

  # Instagram
  - DOMAIN-SUFFIX,instagram.com,Proxy
  - DOMAIN-SUFFIX,cdninstagram.com,Proxy

  # X / Twitter
  - DOMAIN-SUFFIX,x.com,Proxy
  - DOMAIN-SUFFIX,twitter.com,Proxy
  - DOMAIN-SUFFIX,twimg.com,Proxy
  - DOMAIN-SUFFIX,t.co,Proxy

  # Telegram
  - DOMAIN-SUFFIX,telegram.org,Proxy
  - DOMAIN-SUFFIX,t.me,Proxy
  - DOMAIN-SUFFIX,telegram.me,Proxy
  - IP-CIDR,91.108.0.0/16,Proxy
  - IP-CIDR,149.154.0.0/16,Proxy
  - IP-CIDR,185.76.151.0/24,Proxy
  - IP-CIDR,91.105.192.0/23,Proxy
  - IP-CIDR,95.161.64.0/20,Proxy

  # WhatsApp
  - DOMAIN-SUFFIX,whatsapp.com,Proxy
  - DOMAIN-SUFFIX,whatsapp.net,Proxy
  - DOMAIN-SUFFIX,wa.me,Proxy

  # Claude
  - DOMAIN-SUFFIX,claude.ai,Proxy
  - DOMAIN-SUFFIX,anthropic.com,Proxy

  # ChatGPT
  - DOMAIN-SUFFIX,chatgpt.com,Proxy
  - DOMAIN-SUFFIX,openai.com,Proxy
  - DOMAIN-SUFFIX,oaistatic.com,Proxy
  - DOMAIN-SUFFIX,oaiusercontent.com,Proxy

  # Gemini
  - DOMAIN-SUFFIX,gemini.google.com,Proxy
  - DOMAIN-SUFFIX,generativelanguage.googleapis.com,Proxy

  # Clash Royale
  - DOMAIN-SUFFIX,clashroyale.com,Proxy
  - DOMAIN-SUFFIX,supercell.com,Proxy

  # Blockchain
  - DOMAIN-SUFFIX,blockchain.com,Proxy
  - DOMAIN-SUFFIX,blockchain.info,Proxy

  # Fantasy Premier League
  - DOMAIN-SUFFIX,premierleague.com,Proxy

  # Apple
  - DOMAIN-SUFFIX,apple.com,Proxy
  - DOMAIN-SUFFIX,icloud.com,Proxy
  - DOMAIN-SUFFIX,mzstatic.com,Proxy
  - DOMAIN-SUFFIX,cdn-apple.com,Proxy

  # Всё остальное — напрямую
  - MATCH,DIRECT
